<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Alameedi Portfolio Preview</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
        }
        .name {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .title {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .tagline {
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 2rem;
        }
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        .skill {
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="name">Ali Alameedi</h1>
        <p class="title">AI & HPC Software Engineer</p>
        <p class="tagline">Building scalable HPC platforms with developer tools and automation</p>
        <div class="skills">
            <span class="skill">Java</span>
            <span class="skill">Cloud</span>
            <span class="skill">AI</span>
            <span class="skill">Platform Engineering</span>
            <span class="skill">HPC</span>
            <span class="skill">Distributed Systems</span>
        </div>
    </div>
</body>
</html>
