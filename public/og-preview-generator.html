<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Alameedi OG Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 2;
            position: relative;
        }

        .name {
            font-size: 4.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .title {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: #e2e8f0;
            opacity: 0.9;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .skill {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 500;
            color: #10b981;
            backdrop-filter: blur(10px);
        }

        /* Subtle background pattern */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.05;
            background-image:
                radial-gradient(circle at 25% 25%, #10b981 2px, transparent 2px),
                radial-gradient(circle at 75% 75%, #059669 2px, transparent 2px);
            background-size: 50px 50px;
        }

        /* Code brackets decoration */
        .decorations {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 3rem;
            color: rgba(16, 185, 129, 0.2);
            font-family: 'Courier New', monospace;
        }

        .decorations.bottom {
            top: auto;
            bottom: 2rem;
            right: 2rem;
            left: auto;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="decorations">{</div>
    <div class="decorations bottom">}</div>
    <div class="container">
        <h1 class="name">Ali Alameedi</h1>
        <p class="title">Software Engineer</p>
        <div class="skills">
            <span class="skill">Java</span>
            <span class="skill">Cloud</span>
            <span class="skill">Distributed Systems</span>
            <span class="skill">AI</span>
        </div>
    </div>
</body>
</html>
